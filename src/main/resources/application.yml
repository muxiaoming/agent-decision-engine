spring:
  application:
    name: agent-decision-engine
  profiles:
    active: local,dev
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeVideoAutoConfiguration
  mvc:
    favicon:
      enabled: false       # 禁用 favicon.ico 请求，避免 500 错误噪音
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
      chat:
        model: deepseek-chat
      base-url: https://api.deepseek.com
    openai:
      api-key: ${AGNES_AI_API_KEY:your-agnes-ai-api-key}
      base-url: https://apihub.agnes-ai.com/v1
      chat:
        options:
          model: agnes-2.0-flash
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key}
      chat:
        options:
          model: qwen-plus-2025-01-25
    # Spring AI 观测配置（Langfuse 官方推荐）
    chat:
      observations:
        log-prompt: true       # 在 Trace 中记录提示词内容
        log-completion: true   # 在 Trace 中记录补全内容

server:
  port: 8182
  servlet:
    # API 路径前缀配置
    # 所有 Controller 的路径都会自动添加此前缀
    # 例如: @RequestMapping("/chat") -> 实际路径: /api/chat
    context-path: /api

# OpenTelemetry + Micrometer 观测配置（Langfuse 官方推荐）
management:
  observations:
    annotations:
      enabled: true       # Enable @Observed 注解

# OTel 配置
otel:
  logs:
    exporter: none
  metrics:
    exporter: none
  exporter:
    otlp:
      endpoint: http://localhost:3000/api/public/otel
      headers:
        Authorization: "Basic cGstbGYtNjkxNDA3NzItMzgzMi00ZWU1LWExOTEtNWU5MWViNTdjNjEwOnNrLWxmLWI2ZDFmOTQ2LTMxOWEtNDE1Yy04MzM1LTI4N2JhNmY3YjRlYQ=="
        x-langfuse-ingestion-version: "4"

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zhou.ai

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
